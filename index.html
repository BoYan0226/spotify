<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify Visualiser</title>
    <script type="module" crossorigin src="./assets/index-DweDM9RM.js"></script>
    <script type="module" src="./assets/login-flow.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DcZNOpes.css?v=7" />
  </head>
  <body>
    <canvas id="webgl"></canvas>
    <div class="perspective-grid" aria-hidden="true"></div>
    <div class="edge-blur" aria-hidden="true"></div>
    <img class="brand-logo" src="logo.svg" alt="Company logo" />

    <main class="login-shell" aria-label="Login">
      <section class="login-card">

        <h1>欢迎回来</h1>
        <p class="login-subtitle">手机号快捷登录 · 安全认证</p>

        <form class="login-form" novalidate>
          <p class="form-error" id="phone-error">请输入正确的 11 位手机号</p>
          <div class="phone-stage">
            <label class="phone-field" for="phone">
              <span class="country-code">+86</span>
              <span class="field-divider"></span>
              <input
                id="phone"
                name="phone"
                type="tel"
                inputmode="numeric"
                autocomplete="tel"
                maxlength="11"
                required
                pattern="1[0-9]{10}"
                placeholder="请输入手机号"
                aria-describedby="phone-error"
                aria-invalid="false"
              />
            </label>

            <div class="sent-phone-field" aria-live="polite">
              <span>验证码已发送至 <strong id="masked-phone"></strong></span>
              <button class="edit-phone" type="button">修改</button>
            </div>
          </div>

          <div class="verification-panel" aria-hidden="true">
            <label class="verification-label" for="verification-code">短信验证码</label>
            <div class="verification-field">
              <input
                id="verification-code"
                name="verification-code"
                type="text"
                inputmode="numeric"
                autocomplete="one-time-code"
                maxlength="6"
                required
                pattern="[0-9]{6}"
                placeholder="请输入验证码"
                aria-describedby="code-error"
                aria-invalid="false"
              />
              <button class="resend-button" type="button">
                <img src="./assets/refresh-line.svg" alt="" aria-hidden="true" />
                <span>重新发送</span>
              </button>
            </div>
            <p
              class="code-error"
              id="code-error"
              aria-live="polite"
              aria-hidden="true"
            >请输入 6 位短信验证码</p>
          </div>
          <button class="code-button" type="submit">获取验证码</button>
        </form>

        <p class="terms">
          登入即代表同意
          <a href="#">用户协议</a>、<a href="#">隐私政策</a>
          与 <a href="#">免责声明</a>
        </p>
      </section>
    </main>

    <script>
      const root = document.documentElement
      let targetX = 0
      let targetY = 0
      let currentX = 0
      let currentY = 0

      const updateTarget = (event) => {
        targetX = (event.clientX / window.innerWidth - 0.5) * 2
        targetY = (event.clientY / window.innerHeight - 0.5) * 2
      }

      const resetTarget = () => {
        targetX = 0
        targetY = 0
      }

      const animateFollow = () => {
        currentX += (targetX - currentX) * 0.08
        currentY += (targetY - currentY) * 0.08
        root.style.setProperty("--follow-x", currentX.toFixed(4))
        root.style.setProperty("--follow-y", currentY.toFixed(4))
        requestAnimationFrame(animateFollow)
      }

      window.addEventListener("pointermove", updateTarget, { passive: true })
      window.addEventListener("pointerleave", resetTarget)
      animateFollow()
    </script>
  </body>
</html>
