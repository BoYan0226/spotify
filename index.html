<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify Visualiser</title>
    <script type="module" crossorigin src="./assets/index-CNekZczh.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DcZNOpes.css">
  </head>
  <body>
    <canvas id="webgl"></canvas>
    <img class="brand-logo" src="logo.svg" alt="Company logo" />
    <main class="login-shell" aria-label="Login">
      <section class="login-card">
        <h1>欢迎回来</h1>
        <p class="login-subtitle">手机号快捷登录 · 安全认证</p>

        <form class="login-form" novalidate>
          <label class="phone-field" for="phone">
            <span class="country-code">+86</span>
            <span class="field-divider"></span>
            <input
              id="phone"
              name="phone"
              type="tel"
              inputmode="numeric"
              autocomplete="tel"
              maxlength="11"
              placeholder="请输入手机号"
              aria-describedby="phone-error"
              aria-invalid="false"
            />
          </label>
          <p class="form-error" id="phone-error">请输入正确的 11 位手机号</p>
          <button class="code-button" type="submit">获取验证码</button>
        </form>

        <p class="terms">
          登入即代表同意
          <a href="#">用户协议</a>、<a href="#">隐私政策</a>
          与 <a href="#">免责声明</a>
        </p>
      </section>
    </main>
  </body>
</html>
